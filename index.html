<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Россия ТВ — Прямой эфир</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { background:#0a0a14; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,sans-serif; color:#fff; overflow-x:hidden; }

    /* ── HUB SCREEN ── */
    #hub-screen { display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:24px 16px 40px; }
    .hub-logo { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
    .hub-logo .flag { font-size:36px; }
    .hub-logo .title { font-size:26px; font-weight:900; letter-spacing:1px; text-transform:uppercase; }
    .hub-logo .title span { color:#D52B1E; }
    .hub-subtitle { font-size:13px; color:#666; margin-top:-22px; margin-bottom:28px; }
    .channels-grid { width:100%; max-width:560px; display:flex; flex-direction:column; gap:10px; }
    .channel-card { background:#1a1a28; border:1px solid #2a2a3a; border-radius:14px; padding:16px 18px; display:flex; align-items:center; gap:14px; cursor:pointer; transition:all .2s; text-decoration:none; }
    .channel-card:active { opacity:.75; transform:scale(.98); }
    .channel-card .ch-icon { width:52px; height:52px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; flex-shrink:0; }
    .channel-card .ch-info { flex:1; }
    .channel-card .ch-name { font-size:16px; font-weight:700; margin-bottom:3px; }
    .channel-card .ch-desc { font-size:12px; color:#666; }
    .live-dot { width:8px; height:8px; background:#D52B1E; border-radius:50%; animation:pulse 1.2s infinite; flex-shrink:0; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.25} }

    /* ── PLAYER SCREEN ── */
    #player-screen { display:none; flex-direction:column; align-items:center; min-height:100vh; }
    .player-header { width:100%; display:flex; align-items:center; gap:10px; padding:12px 14px; background:#0d0d1a; border-bottom:1px solid #1e1e2e; }
    .back-btn { background:#1a1a2e; border:1px solid #333; border-radius:8px; padding:7px 12px; color:#aaa; font-size:14px; cursor:pointer; }
    .back-btn:active { opacity:.7; }
    .channel-title-bar { font-size:15px; font-weight:700; }
    .channel-title-bar .live-badge { background:#D52B1E; color:#fff; font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; margin-left:6px; display:none; }

    #video-container { width:100%; max-width:900px; background:#000; position:relative; }
    video { width:100%; display:block; background:#000; }
    #audio-bg { display:none; }

    .overlay { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:flex-end; padding:12px; background:linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 60%); transition:opacity .3s; }
    .overlay.hidden { opacity:0; pointer-events:none; }
    .ctrl-row { display:flex; gap:8px; justify-content:center; }
    .ctrl-btn { background:rgba(255,255,255,.15); backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,.2); border-radius:10px; padding:10px 18px; color:#fff; font-size:14px; cursor:pointer; }
    .ctrl-btn:active { opacity:.7; }
    .ctrl-btn.red { background:rgba(213,43,30,.8); border-color:rgba(213,43,30,.9); }

    #status { margin:12px 16px; font-size:13px; color:#888; text-align:center; }
    .s-dot { display:inline-block; width:7px; height:7px; background:#D52B1E; border-radius:50%; margin-right:5px; animation:pulse 1.2s infinite; }

    .player-btns { display:flex; flex-direction:column; align-items:center; gap:8px; padding:8px 16px 24px; width:100%; max-width:900px; }
    .p-btn { width:90%; max-width:340px; padding:12px 20px; border-radius:10px; font-size:15px; border:none; color:#fff; cursor:pointer; transition:opacity .2s; }
    .p-btn:active { opacity:.75; }
    #unmute-btn  { background:#D52B1E; display:none; }
    #reload-btn  { background:#333; display:none; }
    #pip-btn     { background:#1a1a2e; border:1px solid #333; display:none; }

    /* fullscreen */
    #video-container:fullscreen, #video-container:-webkit-full-screen {
      width:100vw!important; height:100vh!important; max-width:none!important; background:#000;
    }
    #video-container:fullscreen video, #video-container:-webkit-full-screen video {
      width:100vw; height:100vh; object-fit:contain;
    }
    .audio-mode video { opacity:0; height:0; }
    #audio-mode-indicator { display:none; font-size:13px; color:#555; text-align:center; margin-top:8px; }
  </style>
</head>
<body>

<!-- ── HUB SCREEN ─────────────────────────────────────────────── -->
<div id="hub-screen">
  <div class="hub-logo">
    <span class="flag">🇷🇺</span>
    <span class="title">РОССИЯ <span>ТВ</span></span>
  </div>
  <div class="hub-subtitle">Прямой эфир • Бесплатно • 24/7</div>

  <div class="channels-grid" id="channels-grid">
    <!-- cards inserted by JS -->
  </div>
</div>

<!-- ── PLAYER SCREEN ──────────────────────────────────────────── -->
<div id="player-screen">
  <div class="player-header">
    <button class="back-btn" id="back-btn">← Каналы</button>
    <div class="channel-title-bar" id="title-bar">
      <span id="title-text"></span>
      <span class="live-badge" id="live-badge">🔴 LIVE</span>
    </div>
  </div>

  <div id="video-container">
    <video id="video" controls autoplay playsinline webkit-playsinline airplay="allow"></video>
    <audio id="audio-bg" playsinline></audio>
    <div class="overlay" id="overlay">
      <div class="ctrl-row">
        <button class="ctrl-btn" id="fs-btn">🔳 Полный экран</button>
        <button class="ctrl-btn" id="am-btn">🎧 Только звук</button>
      </div>
    </div>
  </div>

  <div id="status"><span class="s-dot"></span>Загрузка...</div>
  <div id="audio-mode-indicator">🎧 Аудио режим — закройте экран</div>

  <div class="player-btns">
    <button class="p-btn red"  id="unmute-btn">🔊 Включить звук</button>
    <button class="p-btn"      id="reload-btn">🔄 Переподключиться</button>
    <button class="p-btn"      id="pip-btn">⧉ Картинка в картинке</button>
  </div>
</div>

<script>
if (window.Telegram?.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }

// ── LOCALISATION ───────────────────────────────────────────────
const T = {
  ru:{ loading:'Получаем поток...', connecting:'Подключение...', live:'ПРЯМОЙ ЭФИР 🔴', pressPlay:'Нажмите ▶', error:'Ошибка — переподключаемся...', errUrl:'Не удалось получить URL', errSrv:'Ошибка сервера', reload:'🔄 Переподключиться', unmute:'🔊 Включить звук', mute:'🔇 Выключить звук', fullscreen:'🔳 Полный экран', exitFs:'✕ Выйти', audioMode:'🎧 Только звук', backToFull:'📺 Видео', back:'← Каналы', audioHint:'🎧 Аудио режим — закройте экран' },
  bg:{ loading:'Зареждаме...', connecting:'Свързване...', live:'НА ЖИВО 🔴', pressPlay:'Натиснете ▶', error:'Грешка...', errUrl:'Неуспешно', errSrv:'Грешка', reload:'🔄 Свържи', unmute:'🔊 Звук', mute:'🔇 Тихо', mute:'🔇 Тихо', fullscreen:'🔳 Екран', exitFs:'✕', audioMode:'🎧 Само звук', backToFull:'📺 Видео', back:'← Канали', audioHint:'🎧 Аудио' },
  en:{ loading:'Loading...', connecting:'Connecting...', live:'LIVE 🔴', pressPlay:'Press ▶', error:'Error — reconnecting...', errUrl:'Failed to get URL', errSrv:'Server error', reload:'🔄 Reconnect', unmute:'🔊 Unmute', mute:'🔇 Mute', fullscreen:'🔳 Fullscreen', exitFs:'✕ Exit', audioMode:'🎧 Audio only', backToFull:'📺 Video', back:'← Channels', audioHint:'🎧 Audio mode — lock screen' },
  de:{ loading:'Laden...', connecting:'Verbinden...', live:'LIVE 🔴', pressPlay:'▶ Drücken', error:'Fehler...', errUrl:'Fehler', errSrv:'Serverfehler', reload:'🔄 Neu', unmute:'🔊 Ton', mute:'🔇 Stumm', fullscreen:'🔳 Vollbild', exitFs:'✕', audioMode:'🎧 Nur Ton', backToFull:'📺 Video', back:'← Kanäle', audioHint:'🎧 Audio' },
  fr:{ loading:'Chargement...', connecting:'Connexion...', live:'EN DIRECT 🔴', pressPlay:'Appuyez ▶', error:'Erreur...', errUrl:'Erreur URL', errSrv:'Erreur serveur', reload:'🔄 Reconnecter', unmute:'🔊 Son', mute:'🔇 Muet', fullscreen:'🔳 Plein écran', exitFs:'✕', audioMode:'🎧 Audio', backToFull:'📺 Vidéo', back:'← Chaînes', audioHint:'🎧 Mode audio' },
  es:{ loading:'Cargando...', connecting:'Conectando...', live:'EN VIVO 🔴', pressPlay:'Presione ▶', error:'Error...', errUrl:'Error', errSrv:'Error', reload:'🔄 Reconectar', unmute:'🔊 Sonido', mute:'🔇 Silencio', fullscreen:'🔳 Pantalla', exitFs:'✕', audioMode:'🎧 Audio', backToFull:'📺 Video', back:'← Canales', audioHint:'🎧 Audio' },
  uk:{ loading:'Отримуємо...', connecting:'Підключення...', live:'ПРЯМИЙ ЕФІР 🔴', pressPlay:'Натисніть ▶', error:'Помилка...', errUrl:'Помилка URL', errSrv:'Помилка', reload:'🔄 Повторити', unmute:'🔊 Звук', mute:'🔇 Тихо', mute:'🔇 Тихо', fullscreen:'🔳 Екран', exitFs:'✕', audioMode:'🎧 Аудіо', backToFull:'📺 Відео', back:'← Канали', audioHint:'🎧 Аудіо режим' },
  tr:{ loading:'Yükleniyor...', connecting:'Bağlanıyor...', live:'CANLI 🔴', pressPlay:'▶ Basın', error:'Hata...', errUrl:'URL hatası', errSrv:'Sunucu hatası', reload:'🔄 Bağlan', unmute:'🔊 Ses', mute:'🔇 Sessiz', fullscreen:'🔳 Tam ekran', exitFs:'✕', audioMode:'🎧 Ses', backToFull:'📺 Video', back:'← Kanallar', audioHint:'🎧 Ses modu' },
};
function getLang() {
  try { const s=(Telegram.WebApp.initDataUnsafe?.user?.language_code||'').split('-')[0].toLowerCase(); if(T[s]) return s; } catch(e) {}
  const b=(navigator.language||'ru').split('-')[0].toLowerCase();
  return T[b]?b:'ru';
}
const lang=getLang(), t=T[lang];

// ── CHANNELS ────────────────────────────────────────────────────
const CHANNELS = [
  { id:'perviy', name:'Первый Канал', desc:'Прямой эфир из-за рубежа', icon:'1', iconBg:'#D52B1E' },
  // Добавить сюда новые каналы:
  { id:'rossiya1', name:'Россия 1', desc:'Прямой эфир', icon:'Р', iconBg:'#003893' },
];

// ── PROXY URLS (заменяются скриптом set-proxy-url.js) ──────────
const CHANNEL_APIS = {
  perviy:   { stream: 'https://russia-tv-proxy.vercel.app/api/stream',   proxy: 'https://russia-tv-proxy.vercel.app/api/proxy?url=' },
  rossiya1: { stream: 'https://rossiya1-proxy.vercel.app/api/stream',    proxy: 'https://rossiya1-proxy.vercel.app/api/proxy?url=' },
};
function getAPI(id) { return CHANNEL_APIS[id] || CHANNEL_APIS.perviy; }

// ── CACHE ────────────────────────────────────────────────────────
const CACHE_KEY = 'russia_tv_last_url_v1';

// ── DOM ──────────────────────────────────────────────────────────
const hubScreen    = document.getElementById('hub-screen');
const playerScreen = document.getElementById('player-screen');
const channelsGrid = document.getElementById('channels-grid');
const video        = document.getElementById('video');
const audioBg      = document.getElementById('audio-bg');
const statusEl     = document.getElementById('status');
const reloadBtn    = document.getElementById('reload-btn');
const unmuteBtn    = document.getElementById('unmute-btn');
const pipBtn       = document.getElementById('pip-btn');
const fsBtn        = document.getElementById('fs-btn');
const amBtn        = document.getElementById('am-btn');
const backBtn      = document.getElementById('back-btn');
const titleText    = document.getElementById('title-text');
const liveBadge    = document.getElementById('live-badge');
const overlay      = document.getElementById('overlay');
const container    = document.getElementById('video-container');
const audioHint    = document.getElementById('audio-mode-indicator');

// ── STATE ────────────────────────────────────────────────────────
let hls, currentCh = null, userPaused = false, audioMode = false, isFs = false, wakeLock = null, hideTimer = null;

function isIOS()     { return /iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1); }
function isAndroid() { return /Android/i.test(navigator.userAgent); }

// ── BUILD HUB ────────────────────────────────────────────────────
function buildHub() {
  channelsGrid.innerHTML = '';
  CHANNELS.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'channel-card';
    card.innerHTML = `
      <div class="ch-icon" style="background:${ch.iconBg};">${ch.icon}</div>
      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>
        <div class="ch-desc">${ch.desc}</div>
      </div>
      <div class="live-dot"></div>`;
    card.onclick = () => openChannel(ch);
    channelsGrid.appendChild(card);
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────
function openChannel(ch) {
  currentCh = ch;
  hubScreen.style.display    = 'none';
  playerScreen.style.display = 'flex';
  titleText.textContent = ch.name;
  backBtn.textContent = t.back;
  fsBtn.textContent   = t.fullscreen;
  amBtn.textContent   = t.audioMode;
  init();
}

backBtn.onclick = () => {
  stopStream();
  playerScreen.style.display = 'none';
  hubScreen.style.display    = 'flex';
  currentCh = null;
};

// ── STATUS ────────────────────────────────────────────────────────
function setStatus(msg, isErr) {
  statusEl.innerHTML = isErr
    ? '⚠️ ' + msg
    : '<span class="s-dot"></span>' + msg;
  reloadBtn.style.display = isErr ? 'block' : 'none';
}

// ── MEDIA SESSION ─────────────────────────────────────────────────
function setupMediaSession() {
  if (!('mediaSession' in navigator) || !currentCh) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title:   currentCh.name,
    artist:  'Россия ТВ',
    album:   'Прямой эфир 🔴',
    artwork: [{ src:'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Pervyi_Kanal_logo.svg/512px-Pervyi_Kanal_logo.svg.png', sizes:'512x512', type:'image/png' }]
  });
  navigator.mediaSession.playbackState = 'playing';
  navigator.mediaSession.setActionHandler('play',  async () => { try { await video.play(); } catch(e){} });
  navigator.mediaSession.setActionHandler('pause', () => { video.pause(); });
  navigator.mediaSession.setActionHandler('stop',  () => { video.pause(); });
}

// ── WAKE LOCK ─────────────────────────────────────────────────────
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}

// ── BACKGROUND PLAYBACK ────────────────────────────────────────────
video.addEventListener('mousedown',  () => { userPaused = true; });
video.addEventListener('touchstart', () => { userPaused = true; }, { passive:true });
video.addEventListener('play',  () => { userPaused = false; if ('mediaSession' in navigator) navigator.mediaSession.playbackState='playing'; });
video.addEventListener('pause', () => {
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState='paused';
  if (isAndroid() && document.visibilityState==='hidden' && !userPaused) {
    setTimeout(async () => { if (!userPaused && video.paused) try { await video.play(); } catch(e){} }, 300);
  }
});

document.addEventListener('visibilitychange', async () => {
  if (isIOS()) {
    if (document.visibilityState==='visible' && !userPaused && video.paused) try { await video.play(); } catch(e){}
    return;
  }
  if (isAndroid() && document.visibilityState==='hidden') {
    setTimeout(async () => { if (!userPaused && video.paused) try { await video.play(); } catch(e){} }, 300);
  }
  if (document.visibilityState==='visible' && !userPaused && video.paused) try { await video.play(); } catch(e){}
});
window.addEventListener('pageshow', async () => { if (!userPaused && video.paused) try { await video.play(); } catch(e){} });

// ── AUDIO MODE ────────────────────────────────────────────────────
amBtn.onclick = () => {
  audioMode = !audioMode;
  container.classList.toggle('audio-mode', audioMode);
  audioHint.style.display = audioMode ? 'block' : 'none';
  amBtn.textContent = audioMode ? t.backToFull : t.audioMode;
  if (audioMode) {
    audioBg.src = video.src || '';
    if (hls) { hls.detachMedia(); hls.attachMedia(audioBg); }
    audioBg.muted = false;
    audioBg.play().catch(()=>{});
  } else {
    audioBg.pause();
    if (hls) { hls.detachMedia(); hls.attachMedia(video); }
  }
};

// ── UNMUTE ────────────────────────────────────────────────────────
unmuteBtn.onclick = () => {
  if (video.muted) {
    video.muted = false;
    video.volume = 1;
    unmuteBtn.textContent = '🔇 ' + t.mute;
  } else {
    video.muted = true;
    unmuteBtn.textContent = '🔊 ' + t.unmute;
  }
};

// ── FULLSCREEN ────────────────────────────────────────────────────
let isExpanded = false;
async function enterFs() {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    if (container.requestFullscreen)        { await container.requestFullscreen(); return; }
    if (container.webkitRequestFullscreen)  { container.webkitRequestFullscreen(); return; }
    if (video.webkitEnterFullscreen)        { video.webkitEnterFullscreen(); isExpanded=true; fsBtn.textContent=t.exitFs; return; }
  }
  isExpanded=true; fsBtn.textContent=t.exitFs;
}
async function exitFs() {
  if (document.exitFullscreen)       await document.exitFullscreen();
  else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  isExpanded=false; fsBtn.textContent=t.fullscreen;
}
fsBtn.onclick = () => isExpanded ? exitFs() : enterFs();
function onFsChange() {
  const el = document.fullscreenElement || document.webkitFullscreenElement;
  if (el) { isExpanded=true; fsBtn.textContent=t.exitFs; autoHideOverlay(); } 
  else    { isExpanded=false; fsBtn.textContent=t.fullscreen; overlay.classList.remove('hidden'); clearTimeout(hideTimer); }
  video.style.objectFit = window.innerWidth>window.innerHeight ? 'cover' : 'contain';
}
document.addEventListener('fullscreenchange', onFsChange);
document.addEventListener('webkitfullscreenchange', onFsChange);
video.addEventListener('webkitendfullscreen', () => { isExpanded=false; fsBtn.textContent=t.fullscreen; if(video.paused) video.play().catch(()=>{}); });

function autoHideOverlay() {
  clearTimeout(hideTimer);
  overlay.classList.remove('hidden');
  hideTimer = setTimeout(() => overlay.classList.add('hidden'), 3000);
}
container.addEventListener('click', () => { overlay.classList.remove('hidden'); if (isExpanded) autoHideOverlay(); });

// ── PiP ──────────────────────────────────────────────────────────
pipBtn.onclick = async () => {
  try {
    if (document.pictureInPictureElement) { await document.exitPictureInPicture(); }
    else { await video.requestPictureInPicture(); }
  } catch(e) {}
};
video.addEventListener('leavepictureinpicture', () => { if (video.paused) video.play().catch(()=>{}); });

// ── STREAM ────────────────────────────────────────────────────────
function stopStream() {
  if (hls) { hls.destroy(); hls = null; }
  video.src = '';
  audioBg.src = '';
  liveBadge.style.display = 'none';
  if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; }
}

function loadStream(url, proxyBase) {
  if (!currentCh) return;
  const _proxy = proxyBase || getAPI(currentCh.id).proxy;
  const proxied = _proxy + encodeURIComponent(url);
  setStatus(t.connecting);
  unmuteBtn.style.display = 'none';

  // Cache the working URL
  try { localStorage.setItem(CACHE_KEY + '_' + currentCh.id, url); } catch(e) {}

  if (Hls.isSupported()) {
    if (hls) hls.destroy();
    hls = new Hls({ liveSyncDurationCount:3, enableWorker:true, fragLoadingMaxRetry:4 });
    hls.loadSource(proxied);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      setStatus(t.live);
      liveBadge.style.display = 'inline';
      video.muted = isIOS();
      video.play().then(() => {
        if (isIOS()) unmuteBtn.style.display = 'block';
        setupMediaSession();
        if (!isIOS()) requestWakeLock();
        if ('pictureInPictureEnabled' in document) pipBtn.style.display = 'block';
      }).catch(() => setStatus(t.pressPlay));
    });
    hls.on(Hls.Events.ERROR, (e, d) => {
      if (d.fatal) { setStatus(t.error, true); setTimeout(init, 4000); }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = proxied;
    video.muted = isIOS();
    video.play().then(() => {
      if (isIOS()) unmuteBtn.style.display = 'block';
      setupMediaSession();
      if (!isIOS()) requestWakeLock();
      setStatus(t.live);
      liveBadge.style.display = 'inline';
    }).catch(() => setStatus(t.pressPlay));
  }
}

async function init() {
  if (!currentCh) return;
  setStatus(t.loading);
  reloadBtn.style.display  = 'none';
  unmuteBtn.style.display  = 'none';
  liveBadge.style.display  = 'none';

  // Try cache first for fast start
  try {
    const cached = localStorage.getItem(CACHE_KEY + '_' + currentCh.id);
    if (cached) { loadStream(cached); return; }
  } catch(e) {}

  try {
    const api = getAPI(currentCh.id);
    const r = await fetch(api.stream + '?t=' + Date.now());
    const d = await r.json();
    if (d.url) { loadStream(d.url, api.proxy); }
    else { setStatus(t.errUrl, true); }
  } catch(e) {
    setStatus(t.errSrv, true);
  }
}

async function refresh() {
  if (!currentCh) return;
  try {
    const api = getAPI(currentCh.id);
    const r = await fetch(api.stream + '?t=' + Date.now());
    const d = await r.json();
    if (d.url) try { localStorage.setItem(CACHE_KEY + '_' + currentCh.id, d.url); } catch(e){}
  } catch(e) {}
}

reloadBtn.onclick = () => { stopStream(); init(); };
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') refresh();
});

// ── INIT ──────────────────────────────────────────────────────────
buildHub();

// Check startapp param
const startApp = window.Telegram?.WebApp?.initDataUnsafe?.start_param;
if (startApp) {
  const found = CHANNELS.find(c => c.id === startApp);
  if (found) openChannel(found);
}

// Token refresh every 8 hours (WMSAuth valid 24h)
setInterval(refresh, 8 * 60 * 60 * 1000);
</script>
</body>
</html>
